<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Icon: 3x3 gate grid, last one accent-lit -->
  <g transform="translate(20, 28)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="22" y="0"  width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="44" y="0"  width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Row 2 -->
    <rect x="0"  y="22" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="22" y="22" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="44" y="22" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <!-- Row 3 — all gates passed, last one glowing -->
    <rect x="0"  y="44" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="22" y="44" width="16" height="16" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1.5"/>
    <rect x="44" y="44" width="16" height="16" rx="3" fill="url(#gateGrad)" stroke="none"/>

    <!-- Check marks on all gates except last (already colored) -->
    <!-- Gate checks: tiny white tick marks -->
    <polyline points="4,8 7,11 12,5"   fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="26,8 29,11 34,5"  fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="48,8 51,11 56,5"  fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="4,30 7,33 12,27"  fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="26,30 29,33 34,27" fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="48,30 51,33 56,27" fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="4,52 7,55 12,49"  fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="26,52 29,55 34,49" fill="none" stroke="#00e676" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- last gate: white check on blue bg -->
    <polyline points="48,52 51,55 56,49" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="108" y="58" font-family="-apple-system, 'SF Mono', 'Fira Code', monospace" font-size="28" font-weight="700" fill="#f0f0f0" letter-spacing="-0.5">product</text>
  <text x="108" y="58" font-family="-apple-system, 'SF Mono', 'Fira Code', monospace" font-size="28" font-weight="700" fill="#f0f0f0" letter-spacing="-0.5">
    <tspan fill="#f0f0f0">product</tspan><tspan fill="url(#gateGrad)">-init</tspan>
  </text>

  <!-- Tagline -->
  <text x="109" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="13" fill="#555" letter-spacing="0.02em">9 gates. no skip flag.</text>
</svg>
